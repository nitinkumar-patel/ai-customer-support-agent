map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    # Docker's embedded DNS — resolve upstreams per-request, not at startup.
    # This prevents nginx from crashing when frontend/backend aren't up yet.
    resolver 127.0.0.11 valid=10s ipv6=off;

    set $frontend http://frontend:3000;
    set $backend  http://backend:8000;

    # ── Nginx-level health check (no upstream dependency) ────────────────────
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── Compression ──────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        text/plain text/css text/javascript
        application/json application/javascript
        text/xml application/xml;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── API → FastAPI backend ─────────────────────────────────────────────────
    location /api/ {
        proxy_pass         $backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket (admin /api/admin/logs)
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;

        # SSE (chat /api/chat) — disable buffering so tokens stream immediately
        proxy_buffering           off;
        proxy_cache               off;
        proxy_read_timeout        300s;
        proxy_send_timeout        300s;
        chunked_transfer_encoding on;
    }

    # ── Static assets — long-lived cache ─────────────────────────────────────
    location /_next/static/ {
        proxy_pass $frontend;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Frontend → Next.js ───────────────────────────────────────────────────
    location / {
        proxy_pass         $frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;

        proxy_read_timeout 60s;
    }
}
